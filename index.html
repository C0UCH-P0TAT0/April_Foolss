<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Processing Application</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            flex-direction: column;
        }

        img {
            max-width: 300px;
            margin-bottom: 20px;
        }

        .text {
            font-size: 18px;
            color: #333;
        }

        .dots::after {
            content: "";
            animation: dots 1s steps(3, end) infinite;
        }

        @keyframes dots {
            0% {
                content: "";
            }

            33% {
                content: ".";
            }

            66% {
                content: "..";
            }

            100% {
                content: "...";
            }
        }
    </style>
</head>

<body>

    <!-- Your image -->
    <img src="processing.png" alt="Processing">

    <!-- Text -->
    <div class="text">
        Submitting your application<span class="dots"></span>
    </div>

    <script>
        // Redirect after ~1 second
        setTimeout(function () {
            window.location.href = "https://your-prank-link.com";
        }, 1200);
    </script>

</body>

</html>
